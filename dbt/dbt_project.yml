name: ai_data_platform
version: "1.0.0"
config-version: 2

profile: ai_data_platform

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  ai_data_platform:
    staging:
      +materialized: view
      +schema: staging

    intermediate:
      +materialized: table
      +schema: intermediate

    marts:
      +materialized: table
      +schema: marts

vars:
  # Override in CI with --vars '{"silver_path": "/opt/data/silver"}'
  silver_path: "s3://silver"
  gold_path: "s3://gold"
  minio_endpoint: "http://minio:9000"

# Create the MinIO SECRET on every dbt run. dbt-duckdb 1.7.4 ignores the
# `secrets:` block in profiles.yml, but the DuckDB delta extension requires
# a SECRET (it ignores `SET s3_*` settings). on-run-start runs once per
# `dbt run`/`dbt test` and is wrapped in the adapter's connection.
on-run-start:
  - "CREATE OR REPLACE SECRET minio (TYPE s3, KEY_ID 'minioadmin', SECRET 'minioadmin123', ENDPOINT 'minio:9000', URL_STYLE 'path', USE_SSL false, REGION 'us-east-1')"
