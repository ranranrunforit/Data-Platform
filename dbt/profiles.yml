ai_data_platform:
  target: dev
  outputs:

    # ── Local dev: DuckDB reads Delta files from MinIO via S3 SECRET ─────────
    dev:
      type: duckdb
      path: /tmp/ai_platform_dev.duckdb
      threads: 4
      extensions:
        - httpfs
        - delta
      # The delta extension uses delta_kernel-rs which ignores DuckDB's
      # `SET s3_*` settings — it only respects DuckDB SECRETS. Define the
      # SECRET here so both httpfs and the delta extension see MinIO.
      secrets:
        - type: s3
          name: minio
          key_id: minioadmin
          secret: minioadmin123
          endpoint: minio:9000
          url_style: path
          use_ssl: false
          region: us-east-1

    # ── Production: same config, different path ───────────────────────────────
    # threads: 1 — the DuckDB delta extension (delta_kernel-rs FFI) is not
    # thread-safe; concurrent delta_scan calls cause malloc corruption and
    # SIGABRT. Run models serially.
    prod:
      type: duckdb
      path: /tmp/ai_platform_prod.duckdb
      threads: 1
      extensions:
        - httpfs
        - delta
      secrets:
        - type: s3
          name: minio
          key_id: minioadmin
          secret: minioadmin123
          endpoint: minio:9000
          url_style: path
          use_ssl: false
          region: us-east-1

    # ── CI: in-memory DuckDB with local test fixtures ─────────────────────────
    ci:
      type: duckdb
      path: ":memory:"
      threads: 2
      extensions:
        - delta
